{% extends "layouts/base.html" %}
{% block title %}진행 중 - Flairy{% endblock %}
{% block head %}
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
  <div
    id="progress-container"
    hx-get="/api/projects/{{ project_id }}/status{% if debug %}?debug=1{% endif %}"
    hx-trigger="every 2s, load"
    hx-swap="innerHTML"
  >
    <div class="rounded-lg border border-gray-200 bg-white p-6 animate-pulse">
      <p class="text-center text-gray-400">로딩 중...</p>
    </div>
  </div>

  {% if debug %}
  <section class="mt-8 rounded-lg border-2 border-amber-200 bg-amber-50 p-4">
    <h3 class="font-medium text-amber-800 mb-2">디버그 패널</h3>
    <p class="text-xs text-amber-800 mb-1">상단 카드 하단에 최근 로그가 표시됩니다.</p>
    <div class="mt-3 text-center">
      <a
        id="btnViewResult"
        href="/viewer/{{ project_id }}"
        class="inline-block px-6 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700"
      >
        하이라이트영상 보기
      </a>
    </div>
  </section>
  {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const projectId = "{{ project_id }}";
  const isDebug = {{ "true" if debug else "false" }};
  let analysisTriggered = false;
  let renderTriggered = false;

  function checkAndRedirect() {
    if (isDebug) return;
    const fragment = document.getElementById("progress-fragment");
    if (fragment && fragment.getAttribute("data-status") === "COMPLETED") {
      window.location.href = "/viewer/" + projectId;
    }
  }

  function maybeTriggerGenerate() {
    const fragment = document.getElementById("progress-fragment");
    if (!fragment) return;
    const status = fragment.getAttribute("data-status");
    const mode = fragment.getAttribute("data-mode") || "rule_based";

    if (status === "PENDING" && mode === "ai" && !analysisTriggered) {
      analysisTriggered = true;
      fetch("/api/projects/" + projectId + "/generate", { method: "POST" })
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.status === "accepted") console.log("AI 분석 시작:", d); })
        .catch(function (e) { console.warn("generate 호출 실패:", e); });
      return;
    }
    if (status === "PENDING" && mode === "rule_based" && !renderTriggered) {
      renderTriggered = true;
      fetch("/api/projects/" + projectId + "/generate", { method: "POST" })
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.status === "accepted") console.log("영상 생성 시작:", d); })
        .catch(function (e) { console.warn("generate 호출 실패:", e); });
      return;
    }
    if (status === "COMPOSING" && mode === "ai" && !renderTriggered) {
      renderTriggered = true;
      fetch("/api/projects/" + projectId + "/generate", { method: "POST" })
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.status === "accepted") console.log("영상 생성 시작:", d); })
        .catch(function (e) { console.warn("generate 호출 실패:", e); });
    }
  }

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    if (evt.detail.target.id !== "progress-container") return;
    maybeTriggerGenerate();
    checkAndRedirect();
  });
  setInterval(function () {
    maybeTriggerGenerate();
    checkAndRedirect();
  }, 1000);
})();
</script>
{% endblock %}
