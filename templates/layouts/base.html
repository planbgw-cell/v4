<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Flairy{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; max-width: 100vw; }
    /* 뷰어 공통: 하단 버튼 영역 (앨범·영상 통일) */
    .footer-actions {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-primary-viewer {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      border: 2px solid #d1d5db;
      font-weight: 500;
      background: #fff;
      color: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    }
    .btn-primary-viewer:hover {
      background: #f9fafb;
      transform: scale(1.05);
    }
    .btn-secondary-viewer {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      border: 2px solid #4f46e5;
      font-weight: 500;
      background: #fff;
      color: #4f46e5;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    }
    .btn-secondary-viewer:hover {
      background: #eef2ff;
      transform: scale(1.05);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-gray-50 text-gray-800 min-h-screen{% endblock %}">
  {% block content %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
